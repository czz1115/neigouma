<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>内购码领取</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: #f5f5f5;
    padding: 40px 20px;
    text-align: center;
  }
  h2 {
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 24px;
  }
  button {
    padding: 14px 28px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    background: #1677ff;
    color: #fff;
    cursor: pointer;
  }
  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .code {
    margin-top: 24px;
    font-size: 22px;
    font-weight: bold;
    color: #e63946;
    word-break: break-all;
  }
  .info {
    margin-top: 12px;
    font-size: 14px;
    color: #888;
  }
  .remain {
    margin-top: 8px;
    font-size: 15px;
    color: #1677ff;
    font-weight: bold;
  }
  .my-codes {
    margin-top: 24px;
    padding: 16px;
    background: #e8f5e9;
    border-radius: 8px;
    border: 1px solid #a5d6a7;
    text-align: left;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .my-codes h4 {
    margin: 0 0 8px 0;
    font-size: 14px;
    color: #2e7d32;
  }
  .my-codes .code-list {
    font-size: 15px;
    color: #2e7d32;
    font-weight: bold;
    line-height: 1.8;
    word-break: break-all;
  }
  .my-codes .empty {
    font-size: 13px;
    color: #999;
  }
  .tips {
    margin-top: 40px;
    padding: 16px;
    background: #fff8e6;
    border-radius: 8px;
    border: 1px solid #ffe0b2;
    text-align: left;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .tips h4 {
    margin: 0 0 8px 0;
    font-size: 14px;
    color: #e6a23c;
  }
  .tips p {
    margin: 4px 0;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h2>🎁 内购码领取</h2>
<p class="subtitle">每人最多可领取 <b>1</b> 个内购码，先到先得</p>

<button id="btn">立即领取</button>
<div class="code" id="result"></div>
<div class="info" id="info"></div>
<div class="remain" id="remain"></div>

<!-- 已领取的码展示区 -->
<div class="my-codes" id="myCodesBox">
  <h4>📋 我已领取的内购码</h4>
  <div class="empty" id="codeListEmpty">暂无领取记录</div>
  <div class="code-list" id="codeList"></div>
</div>

<div class="tips">
  <h4>📌 温馨提示</h4>
  <p>1、每个人仅限领取一个内购码</p>
  <p>2、内购码数量有限，先到先得</p>
  <p>3、请妥善保管你的内购码</p>
</div>

<script>
let codePool = [
  "NG11ioRmNj",
  "NG11SaC9G2",
  "NG11sKVYhm",
  "NG11nsmEkZ",
  "NG118MP2cz",
  "NG11CObg84",
  "NG11sx0l29",
  "NG11IKLSal",
  "NG116mj32q",
  "NG111rBUux",
  "NG11AacI0z",
  "NG11cwIR3r",
  "NG11PO4gn2",
  "NG11XlKCzu",
  "NG11i4zokE",
  "NG11qew6F5",
  "NG11EnFXAq",
  "NG11ao5yXm",
  "NG11t2qUe8",
  "NG11Ti1RaE",
  "NG11zdOu8F",
  "NG1174wqhA",
  "NG11o1Zipe",
  "NG11VSZW4m",
  "NG11E1jcVR",
  "NG11lRt4Ma",
  "NG118AeQNJ",
  "NG11dBQ73I",
  "NG11ZnPcBg",
  "NG11QNVnU9",
  "NG117WELIr",
  "NG11B6EKLu",
  "NG11mDLo61",
  "NG11dCKmlM",
  "NG11RhOeCi"
];

const MAX_CLAIM = 1;

const btn = document.getElementById("btn");
const result = document.getElementById("result");
const info = document.getElementById("info");
const remain = document.getElementById("remain");
const codeList = document.getElementById("codeList");
const codeListEmpty = document.getElementById("codeListEmpty");

let claimedCount = Number(localStorage.getItem("claimedCount") || 0);
let claimedCodes = JSON.parse(localStorage.getItem("claimedCodes") || "[]");

/* 初始化显示 */
info.innerText = "\u5df2\u9886\u53d6 " + claimedCount + "/" + MAX_CLAIM + " \u4e2a";
remain.innerText = "\u5269\u4f59\u53ef\u9886\u53d6\uff1a" + codePool.length + " \u4e2a";

/* 展示已领取的码 */
function renderClaimedCodes() {
  if (claimedCodes.length > 0) {
    codeListEmpty.style.display = "none";
    codeList.style.display = "block";
    codeList.innerHTML = claimedCodes.join("<br>");
  } else {
    codeListEmpty.style.display = "block";
    codeList.style.display = "none";
  }
}
renderClaimedCodes();

if (claimedCount >= MAX_CLAIM) {
  btn.disabled = true;
  result.innerText = "\u4f60\u5df2\u9886\u53d6\u6ee1 " + MAX_CLAIM + " \u4e2a\uff0c\u611f\u8c22\u53c2\u4e0e\uff01";
}

btn.onclick = () => {
  if (codePool.length === 0) {
    result.innerText = "\u274c \u5185\u8d2d\u7801\u5df2\u5168\u90e8\u9886\u5b8c";
    btn.disabled = true;
    remain.innerText = "\u5269\u4f59\u53ef\u9886\u53d6\uff1a0 \u4e2a";
    return;
  }

  if (claimedCount >= MAX_CLAIM) {
    result.innerText = "\u274c \u6bcf\u4eba\u6700\u591a\u9886\u53d6 " + MAX_CLAIM + " \u4e2a";
    btn.disabled = true;
    return;
  }

  const idx = Math.floor(Math.random() * codePool.length);
  const code = codePool.splice(idx, 1)[0];

  claimedCount++;
  claimedCodes.push(code);

  localStorage.setItem("claimedCount", claimedCount);
  localStorage.setItem("claimedCodes", JSON.stringify(claimedCodes));

  result.innerText = code;
  info.innerText = "\u5df2\u9886\u53d6 " + claimedCount + "/" + MAX_CLAIM + " \u4e2a";
  remain.innerText = "\u5269\u4f59\u53ef\u9886\u53d6\uff1a" + codePool.length + " \u4e2a";

  renderClaimedCodes();

  if (claimedCount >= MAX_CLAIM) {
    btn.disabled = true;
  }
};
</script>

</body>
</html>
