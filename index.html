<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>内购码领取</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: #f5f5f5;
    padding: 40px;
    text-align: center;
  }
  button {
    padding: 14px 28px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    background: #1677ff;
    color: #fff;
    cursor: pointer;
  }
  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .code {
    margin-top: 24px;
    font-size: 22px;
    font-weight: bold;
    color: #e63946;
