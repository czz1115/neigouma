<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>领取内购码</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
  .card{background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
  .emoji{font-size:48px;margin-bottom:8px}
  h1{font-size:22px;color:#222;margin-bottom:6px}
  .sub{font-size:13px;color:#888;margin-bottom:24px;line-height:1.6}
  button{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;font-size:17px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:1px}
  button:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(7,193,96,.35)}
  button:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
  .out{margin-top:24px;display:none;animation:pop .3s ease}
  .out.show{display:block}
  .label{font-size:12px;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
  .code-box{background:#f7f7f7;border:2px dashed #ddd;border-radius:12px;padding:16px 12px;font-size:20px;font-weight:700;color:#e63946;word-break:break-all;letter-spacing:1px;position:relative}
  .copied{position:absolute;top:6px;right:10px;font-size:11px;background:#07c160;color:#fff;padding:3px 8px;border-radius:6px;opacity:0;transition:opacity .3s}
  .copied.on{opacity:1}
  .done{margin-top:16px;font-size:13px;color:#aaa}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🎁</div>
  <h1>领取你的内购码</h1>
  <p class="sub">点击下方按钮，系统自动分配一个有效编码<br>可多次领取，分享给朋友一起领</p>
  <button id="btn" onclick="draw()">立即领取</button>
  <div class="out" id="out">
    <div class="label">你的编码</div>
    <div class="code-box" id="codeBox">
      <span id="codeText"></span>
      <span class="copied" id="copied">已复制 ✓</span>
    </div>
    <div class="done" id="done"></div>
  </div>
</div>

// 用 sessionStorage 在本浏览器内追踪已领（防同一人狂点重复看到同一个）
function getPool(){
  let raw = sessionStorage.getItem('pool');
  if(raw) return JSON.parse(raw);
  // 首次：打乱顺序（Fisher-Yates）
  const arr = [...ALL_CODES];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  sessionStorage.setItem('pool',JSON.stringify(arr));
  return arr;
}

window.draw = function(){
  const btn=document.getElementById('btn');
  const out=document.getElementById('out');
  const codeText=document.getElementById('codeText');
  const doneEl=document.getElementById('done');
  btn.disabled=true; btn.innerText='分配中...';
  setTimeout(()=>{
    const pool=getPool();
    if(!pool.length){
      out.classList.add('show');
      codeText.innerText='已全部领完！';
      btn.innerText='已发完';
      return;
    }
    const code = pool.pop();
    sessionStorage.setItem('pool',JSON.stringify(pool));
    sessionStorage.setItem('lastCode',code);
    codeText.innerText=code;
    out.classList.add('show');
    doneEl.innerText='请截图保存 ↑（剩 '+pool.length+' 个）';
    // 尝试自动复制
    navigator.clipboard&&navigator.clipboard.writeText(code).catch(()=>{});
    btn.disabled=false; btn.innerText='再领一个';
  },300);
};
